<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    /* .box 设置了粘性定位，滚动时距离顶部小于 100px 会固定，超出父容器范围后解除固定，未脱离文档流。
总结
粘性定位是相对定位 + 固定定位的结合，不脱离文档流，滚动到阈值才吸附。 */
        body {
            height: 2000px;
        }
        .parent {
            width: 500px;
            height: 500px;
            background-color: pink;
        }
        .child {
            width: 300px;
            height: 200px;
            background-color: skyblue;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: palegreen;
            position: sticky;
            top: 100px;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child">

        </div>
    </div>
    <div class="box"></div>
</body>
</html>
