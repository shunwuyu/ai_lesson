<!DOCTYPE html>
<html lang="zh-CN">
<head>
<style>
/* 1. 定义旋转的关键帧 */
@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

/* 2. 应用到 Loading 元素上 */
.loading-spinner {
  /* 简单的样式，画一个圆圈 */
  width: 40px;
  height: 40px;
  border: 4px solid #f3f3f3; /* 浅色背景圈 */
  border-top: 4px solid #3498db; /* 深色高亮部分，形成缺口 */
  border-radius: 50%; /* 变圆 */

  /* 核心动画属性 */
  animation: spin 1s linear infinite;
  /* 
     spin: 对应上面定义的 keyframes 名称
     1s: 旋转一圈耗时 1秒
     linear: 匀速运动，避免忽快忽慢
     infinite: 无限循环
  */
}
</style>
</head>
<body>

<div class="loading-container">
  <div class="loading-spinner"></div>
  <p>AI 正在深度思考中...</p>
</div>

</body>
</html>
