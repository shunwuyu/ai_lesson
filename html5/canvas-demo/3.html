<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>CSS3 最简单3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* 舞台：开启3D透视 */
    .box-wrap {
      width: 200px;
      height: 200px;
      /* 透视距离，值越小立体感越强 */
      perspective: 600px;
    }

    /* 容器：开启3D空间 */
    .box {
      width: 100%;
      height: 100%;
      position: relative;
      /* 保留子元素3D变换 */
      transform-style: preserve-3d;
      /* 自动旋转动画 */
      animation: rotate 5s linear infinite;
    }

    /* 立方体六个面统一样式 */
    .face {
      width: 200px;
      height: 200px;
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #fff;
      /* opacity: 1; */
      opacity: 0.8;
    }

    /* 各个面位移旋转 */
    .front  { background: #4299e1; transform: translateZ(100px); }
    .back   { background: #f56565; transform: translateZ(-100px) rotateY(180deg); } 
    .left   { background: #48bb78; transform: translateX(-100px) rotateY(-90deg); }
    .right  { background: #ed8936; transform: translateX(100px) rotateY(90deg); }
    .top    { background: #9f7aea; transform: translateY(-100px) rotateX(90deg); }
    .bottom { background: #ecc94b; transform: translateY(100px) rotateX(-90deg); }

    /* 旋转动画 */
    @keyframes rotate {
      100% {
        transform: rotateY(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="box-wrap">
    <div class="box">
      <div class="face front">前</div>
      <div class="face back">后</div>
      <div class="face left">左</div>
      <div class="face right">右</div>
      <div class="face top">上</div>
      <div class="face bottom">下</div>
    </div>
  </div>
</body>
</html>
